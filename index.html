<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oveta — Próximamente</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0a0a09;
      --surface: #131310;
      --border:  #2a2a24;
      --text:    #e8e6df;
      --muted:   #7a7870;
      --accent:  #c8a96e;
      --hover:   #1c1c18;
    }

    html, body {
      height: 100%;
      height: 100dvh;
      overflow-y: auto; /* ← Permite pull-to-refresh */
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
    }

    /* ── GRAIN ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.03;
      pointer-events: none;
      z-index: 0;
    }

    /* ── AMBIENT GLOW ── */
    body::after {
      content: '';
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(200,169,110,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      gap: 0;
    }

    /* ── LOGO WRAP (Intacto) ── */
    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      margin-bottom: 12px;
      opacity: 0;
      transform: translateY(-16px);
      animation: fadeUp 0.9s cubic-bezier(.22,1,.36,1) 0.1s forwards;
    }

    /* ── LOGO IMAGE (Intacto) ── */
    .logo-img {
      filter: invert(1);
      width: 90px;
      height: 90px;
      object-fit: contain;
    }

    /* ── WORDMARK (Intacto) ── */
    .logo-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.6rem;
      font-weight: 300;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--text);
      line-height: 1;
      display: inline-block;
    }

    /* A sin travesaño (Intacto) */
    .custom-a {
      position: relative;
      display: inline-block;
    }

    .custom-a::after {
      content: '';
      position: absolute;
      background: var(--bg);
      pointer-events: none;
      height: 0.12em;
  
    /* Valores para PC: Ajustá estos porcentajes hasta que encaje perfecto en tu monitor */
      top: 48%;
      left: 23%; 
      right: 55%; 
    }

    /* ── Configuración para Móvil (Mantiene lo que ya te funciona) ── */
    @media (max-width: 768px) {
    .custom-a::after {
      top: 49%;
      left: 22%;
      right: 56%;
    }
    }

    /* ── TAGLINE ── */
    .tagline {
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
      opacity: 0;
      animation: fadeUp 0.9s cubic-bezier(.22,1,.36,1) 0.25s forwards;
      text-align: center; /* ← Centrado para móviles */
    }

    /* ── DIVIDER ── */
    .divider {
      width: 40px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      margin: 20px 0 32px;
      opacity: 0;
      animation: fadeUp 0.9s cubic-bezier(.22,1,.36,1) 0.35s forwards;
    }

    /* ── STATUS PILL (Optimizado para evitar repaints) ── */
    .status {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(200,169,110,0.06);
      border: 1px solid rgba(200,169,110,0.45);
      border-radius: 100px;
      padding: 10px 22px;
      font-size: 0.8rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 400;
      margin-bottom: 36px;
      opacity: 0;
      box-shadow: 0 0 20px rgba(200,169,110,0.12), inset 0 0 20px rgba(200,169,110,0.04);
      animation: fadeUp 0.9s cubic-bezier(.22,1,.36,1) 0.45s forwards;
    }

    .status::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 100px;
      box-shadow: 0 0 32px rgba(200,169,110,0.22), inset 0 0 24px rgba(200,169,110,0.08);
      opacity: 0;
      animation: glowPulse 3s ease-in-out 1.5s infinite;
      pointer-events: none;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent), 0 0 20px rgba(200,169,110,0.5);
      animation: pulse 2.4s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    @keyframes glowPulse {
      0%, 100% { opacity: 0; }
      50%       { opacity: 1; }
    }

    /* ── LINKS ── */
    .links {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      max-width: 420px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 20px;
      text-decoration: none;
      color: var(--text);
      font-size: 0.88rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      transition: background 0.2s, border-color 0.2s, transform 0.18s;
      position: relative;
      overflow: hidden;
      opacity: 0;
    }

    .link-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(200,169,110,0.06) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .link-btn:hover { background: var(--hover); border-color: rgba(200,169,110,0.3); transform: translateY(-1px); }
    .link-btn:hover::before { opacity: 1; }
    .link-btn:active { transform: translateY(0); }

    .icon-wrap {
      width: 36px;
      height: 36px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
    }

    .icon-wrap svg { width: 18px; height: 18px; }

    .btn-label {
      flex: 1;
      text-align: center;
      margin-right: 36px;
    }

    .link-btn:nth-child(1) { animation: fadeUp 0.7s cubic-bezier(.22,1,.36,1) 0.55s forwards; }
    .link-btn:nth-child(2) { animation: fadeUp 0.7s cubic-bezier(.22,1,.36,1) 0.65s forwards; }
    .link-btn:nth-child(3) { animation: fadeUp 0.7s cubic-bezier(.22,1,.36,1) 0.75s forwards; }

    /* ── FOOTER ── */
    .footer {
      margin-top: 40px;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--border);
      opacity: 0;
      animation: fadeUp 0.9s cubic-bezier(.22,1,.36,1) 1s forwards;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ══ ADAPTACIÓN (Ancho) ══ */
    @media (max-width: 768px) {
      .logo-text       { font-size: 2.2rem; }
      .tagline         { font-size: 0.72rem; }
      .links           { max-width: 90%; }
    }

    @media (max-width: 380px) {
      .logo-text       { font-size: 1.9rem; letter-spacing: 0.2em; }
      .links           { max-width: 100%; }
      .link-btn        { font-size: 0.8rem; }
    }

    /* ══ ADAPTACIÓN (Alto) ══ */
    @media (max-height: 750px) {
      .logo-img        { width: 52px; height: 52px; }
      .logo-wrap       { gap: 10px; margin-bottom: 6px; }
      .tagline         { font-size: 0.7rem; }
      .divider         { margin: 12px 0 20px; }
      .status          { padding: 8px 18px; font-size: 0.72rem; margin-bottom: 24px; }
      .links           { gap: 8px; }
      .link-btn        { padding: 12px 16px; }
      .footer          { margin-top: 24px; }
    }

    @media (max-height: 620px) {
      .logo-img        { width: 40px; height: 40px; }
      .logo-text       { font-size: 1.6rem; }
      .tagline         { font-size: 0.65rem; letter-spacing: 0.12em; }
      .divider         { margin: 8px 0 14px; }
      .status          { padding: 6px 14px; font-size: 0.68rem; margin-bottom: 16px; }
      .link-btn        { padding: 10px 14px; font-size: 0.82rem; }
      .footer          { margin-top: 16px; font-size: 0.62rem; }
    }
  </style>
</head>
<body>
